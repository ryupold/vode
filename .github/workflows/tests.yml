name: Unit Tests

on:
  push:
  workflow_dispatch:

jobs:
  run-tests:
    name: run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run test

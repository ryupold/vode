name: Publish release to NPM, GitHub & Chimps Packages

on:
  release:
    types: published
    branches:
      - "main"
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  packages: write
  attestations: write
  contents: read

jobs:
  build-and-publish-to-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run release
      - run: |
          ((npm publish --provenance --access public 2> /dev/null) | grep "@ryupold/vode@" > version.txt) || echo "...done"
          NEWVERSION=$(cat version.txt)
          if [[ $NEWVERSION == *"409 Conflict"* || $NEWVERSION == *"@ryupold/vode@"* ]]; then
            echo "...success: $NEWVERSION"
          else
            echo "...failed to publish"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          registry-url: "https://npm.pkg.github.com"
      - run: |
          ((npm publish --access public 2> /dev/null) | grep "@ryupold/vode@" > version.txt) || echo "...done"
          NEWVERSION=$(cat version.txt)
          if [[ $NEWVERSION == *"409 Conflict"* || $NEWVERSION == *"@ryupold/vode@"* ]]; then
            echo "...success: $NEWVERSION"
          else
            echo "...failed to publish"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - run: |
          cp .github/workflows/bunfig.toml bunfig.toml
          ((bun publish --token="$CHIMPS_TOKEN" 2> /dev/null) | grep "@ryupold/vode@" > version.txt) || echo "...done"
          NEWVERSION=$(cat version.txt)
          if [[ $NEWVERSION == *"409 Conflict"* || $NEWVERSION == *"@ryupold/vode@"* ]]; then
            echo "...success: $NEWVERSION"
          else
            echo "...failed to publish"
            exit 1
          fi
        env:
          CHIMPS_TOKEN: ${{ secrets.CHIMPS_TOKEN }}
